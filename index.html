    ];

    const chapters = [...new Set(questions.map(q => q.ch))];

    function init() {
        const tabs = document.getElementById('tabs');
        const content = document.getElementById('content');

        // Create Chapter Tabs
        chapters.forEach((ch, idx) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerText = ch;
            btn.onclick = () => showChapter(ch, btn);
            tabs.appendChild(btn);

            // Create Section
            const sect = document.createElement('div');
            sect.id = `ch-${ch.replace(/\s+/g, '')}`;
            sect.className = `chapter-view ${idx === 0 ? 'active' : ''}`;
            
            questions.filter(q => q.ch === ch).forEach(q => {
                const card = document.createElement('div');
                card.className = 'q-card';
                card.innerHTML = `
                    <div class="q-meta">Question ${q.id}</div>
                    <div style="font-weight:600; margin-bottom:10px;">${q.q}</div>
                    <div class="options-box">
                        <div class="opt">${q.a}</div><div class="opt">${q.b}</div>
                        <div class="opt">${q.c}</div><div class="opt">${q.d}</div>
                    </div>
                    <button class="ans-btn" onclick="toggleAns(this)">Show Solution</button>
                    <div class="ans-reveal">
                        Correct Answer: ${q.ans}
                        <div class="logic"><strong>Why?</strong> ${q.log}</div>
                    </div>
                `;
                sect.appendChild(card);
            });
            content.appendChild(sect);
        });
    }

    function showChapter(ch, btn) {
        document.querySelectorAll('.chapter-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`ch-${ch.replace(/\s+/g, '')}`).classList.add('active');
        btn.classList.add('active');
    }

    function toggleAns(btn) {
        const reveal = btn.nextElementSibling;
        const isHidden = reveal.style.display === 'none' || reveal.style.display === '';
        reveal.style.display = isHidden ? 'block' : 'none';
        btn.innerText = isHidden ? 'Hide Solution' : 'Show Solution';
    }

    init();
</script>
